name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 22

    steps:
      - name: Checkout
        # actions/checkout v5 pinned on 2026-06-06.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node
        # actions/setup-node v5 pinned on 2026-06-06.
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check
        run: npm run check

      - name: Smoke test
        run: npm run smoke

      - name: Package dry-run
        run: npm pack --dry-run
