<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Zh Localizer preview</title>
  <desc id="desc">A before and after preview showing Codex plugin metadata localized from English to Chinese.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.54" stop-color="#18202F"/>
      <stop offset="1" stop-color="#10251F"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="36" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="540" rx="28" fill="#0B1220" fill-opacity="0.72" stroke="#273449"/>
  <rect x="40" y="40" width="1120" height="5" fill="url(#line)"/>

  <text x="80" y="112" fill="#E5E7EB" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="46" font-weight="750">Codex Zh Localizer</text>
  <text x="80" y="154" fill="#A7F3D0" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="23" font-weight="650">让 Codex 插件市场和插件详情页真正中文可读</text>
  <text x="80" y="194" fill="#94A3B8" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="19">Unofficial, reversible Chinese localization for Codex plugin metadata.</text>

  <g transform="translate(80 238)" filter="url(#shadow)">
    <rect width="470" height="274" rx="20" fill="#111827" stroke="#334155"/>
    <text x="28" y="44" fill="#FCA5A5" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="16" font-weight="700">Before</text>
    <text x="28" y="82" fill="#F8FAFC" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="23" font-weight="750">GitHub</text>
    <text x="28" y="112" fill="#94A3B8" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="16">Access repositories, issues, and pull requests.</text>
    <rect x="28" y="142" width="414" height="1" fill="#263244"/>
    <text x="28" y="180" fill="#E5E7EB" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="18" font-weight="650">Review Follow-up</text>
    <text x="28" y="207" fill="#94A3B8" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15">Address actionable PR feedback</text>
    <text x="28" y="242" fill="#E5E7EB" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="18" font-weight="650">Security Scan</text>
  </g>

  <g transform="translate(650 238)" filter="url(#shadow)">
    <rect width="470" height="274" rx="20" fill="#0F1F1A" stroke="#2B5245"/>
    <text x="28" y="44" fill="#86EFAC" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="16" font-weight="700">After</text>
    <text x="28" y="82" fill="#F8FAFC" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="23" font-weight="750">GitHub 代码协作</text>
    <text x="28" y="112" fill="#A7F3D0" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="16">访问代码仓库、Issue 和 Pull Request</text>
    <rect x="28" y="142" width="414" height="1" fill="#285040"/>
    <text x="28" y="180" fill="#E5E7EB" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="18" font-weight="650">PR 反馈处理</text>
    <text x="28" y="207" fill="#A7F3D0" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15">处理可执行的 PR 审查反馈</text>
    <text x="28" y="242" fill="#E5E7EB" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="18" font-weight="650">安全扫描</text>
  </g>

  <g transform="translate(80 535)">
    <rect width="150" height="34" rx="17" fill="#172033" stroke="#334155"/>
    <text x="20" y="23" fill="#C7D2FE" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="14" font-weight="650">Dry-run first</text>
    <rect x="166" width="156" height="34" rx="17" fill="#172033" stroke="#334155"/>
    <text x="186" y="23" fill="#A7F3D0" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="14" font-weight="650">Backup restore</text>
    <rect x="338" width="178" height="34" rx="17" fill="#172033" stroke="#334155"/>
    <text x="358" y="23" fill="#FDE68A" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="14" font-weight="650">No app.asar patch</text>
  </g>
</svg>
